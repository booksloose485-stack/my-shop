        box-sizing: border-box;

        margin: 0;  
        padding: 0;  
    }

        background-repeat: no-repeat;  
        color: #333;

    header {  
        background: rgba(255, 255, 255, 0.8);

        color: #000;  
        padding: 2.5rem 1rem;  
        text-align: center;

    .container {

    /* ລະບົບ Grid ປັບໃຫ້ເໝາະກັບມືຖື */  
    .product-grid {  
        display: grid;  
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));  
        gap: 20px;  
    }  

    .product-card {  
        background: #ffffff;  
        border-radius: 15px;  
        overflow: hidden;  
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);  
        transition: all 0.3s ease;  
        cursor: pointer;  
        border: 1px solid #eee;  
    }  

    .product-card:hover {  
        transform: translateY(-10px);  
        box-shadow: 0 8px 25px rgba(0,0,0,0.2);  
    }  

    .product-image {  
        width: 100%;  
        height: 220px;  
        object-fit: cover;  
        border-bottom: 1px solid #f0f0f0;  
    }  

    .product-info {  
        padding: 15px;  
        text-align: center;  
    }  

    .product-name {  
        font-size: 0.9rem;  
        color: #666;  
        margin-bottom: 5px;  
    }  

    .product-price {  
        color: #d32f2f;  
        font-weight: bold;  
        font-size: 1.2rem;  
    }  

    /* --- Modal Style --- */  
    .modal {  
        display: none;  
        position: fixed;  
        z-index: 1000;  
        left: 0;  
        top: 0;  
        width: 100%;  
        height: 100%;  
        background-color: rgba(0, 0, 0, 0.8);  
        align-items: center;  
        justify-content: center;  
        padding: 20px;  
    }  

    .modal-content {  
        background-color: #fff;  
        padding: 2rem;  
        border-radius: 20px;  
        max-width: 500px;  
        width: 100%;  
        position: relative;  
        text-align: center;  
        animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    }  

    @keyframes popIn {  
        from { opacity: 0; transform: scale(0.8); }  
        to { opacity: 1; transform: scale(1); }  
    }  

    .close-btn {  
        position: absolute;  
        right: 20px;  
        top: 10px;  
        font-size: 30px;  
        cursor: pointer;  
        color: #aaa;  
    }  

    .modal-img {  
        width: 100%;

        object-fit: contain;  
        margin-bottom: 1rem;  
        border-radius: 10px;
